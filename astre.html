<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astre Flasher — Best & Fast Crypto Flasher Bot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0b0e1a 0%, #1a1040 50%, #0b0e1a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 60px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      border: 2px dashed rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #c084fc, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 20px;
      font-weight: 400;
    }

    .description {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 32px;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .feature-chip {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
    }

    .btn {
      display: inline-block;
      padding: 16px 48px;
      border-radius: 60px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.35);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(124, 58, 237, 0.5);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 36px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.2);
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 540px) {
      .card {
        padding: 40px 24px;
        border-radius: 24px;
      }

      .logo {
        width: 90px;
        height: 90px;
        margin-bottom: 18px;
      }

      h1 {
        font-size: 28px;
      }

      .tagline {
        font-size: 14px;
        margin-bottom: 16px;
      }

      .description {
        font-size: 14px;
        margin-bottom: 24px;
      }

      .features {
        gap: 8px;
        margin-bottom: 28px;
      }

      .feature-chip {
        font-size: 12px;
        padding: 6px 14px;
      }

      .btn {
        padding: 14px 36px;
        font-size: 15px;
      }

      .footer {
        margin-top: 28px;
        font-size: 12px;
      }
    }

    @media (max-width: 380px) {
      .card {
        padding: 28px 16px;
      }

      h1 {
        font-size: 24px;
      }

      .btn {
        padding: 12px 28px;
        font-size: 14px;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="image.png" alt="Astre Flasher logo">
    </div>
    <h1>Astre Flasher</h1>
    <p class="tagline">Best & Fast Crypto Flasher Bot</p>
    <p class="description">
      Flash any cryptocurrency instantly with the fastest bot on Telegram.
      Reliable, secure, and built for speed — no delays, no gimmicks.
    </p>
    <div class="features">
      <span class="feature-chip">⚡ Instant Flashing</span>
      <span class="feature-chip">🔒 Secure</span>
      <span class="feature-chip">🌐 Multi-Chain</span>
      <span class="feature-chip">🤖 24/7 Bot</span>
    </div>
    <a href="https://t.me/astreflasher" class="btn" target="_blank" rel="noopener">Bot Link</a>
    <p class="footer">© 2026 Astre Flasher</p>
  </div>
</body>
</html>
